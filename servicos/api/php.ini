# Configuração de Logging de Erros do PHP

; Exibir erros no stderr (útil em containerização)
display_errors = On
display_startup_errors = On

; Habilitar registro de erros em arquivo
log_errors = On
error_log = /var/www/html/storage/logs/php-error.log

; Habilitar logging de erros fatais
log_errors_max_len = 1024

; Registrar avisos de deprecação
error_reporting = E_ALL

; Incluir timestamps nos logs
; Note: Isso é feito através do Laravel/Monolog

; Limite de memória padrão
memory_limit = 512M

; Timeout padrão
max_execution_time = 30

; Upload de arquivos
upload_max_filesize = 100M
post_max_size = 100M

; Informações de depuração
display_startup_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Logs de conexões de banco de dados
; pgsql.log_notice = On
; pgsql.log_errors = On
